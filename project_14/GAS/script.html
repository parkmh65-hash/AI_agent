<script>
  // Safe localStorage helper to prevent SecurityError inside Google iframe sandbox
  const safeLocalStorage = {
    getItem: (key) => {
      try {
        return localStorage.getItem(key);
      } catch (e) {
        console.warn("localStorage read blocked:", e);
        return null;
      }
    },
    setItem: (key, value) => {
      try {
        localStorage.setItem(key, value);
      } catch (e) {
        console.warn("localStorage write blocked:", e);
      }
    }
  };

  // 1. Core State
  let apiBaseUrl = safeLocalStorage.getItem("rag_api_base_url") || "http://localhost:8000";
  let chatHistory = [];
  let uploading = false;
  let loading = false;

  // 2. DOM Elements
  const apiInput = document.getElementById("api-base-url");
  const btnSettings = document.getElementById("btn-settings");
  const settingsPanel = document.getElementById("settings-panel");
  const btnReset = document.getElementById("btn-reset");
  
  const dropzone = document.getElementById("dropzone");
  const fileInput = document.getElementById("file-input");
  const btnFindFile = document.getElementById("btn-find-file");
  const uploadError = document.getElementById("upload-error");
  const fileInfo = document.getElementById("file-info");
  const fileNameDisplay = document.getElementById("file-name-display");
  const fileStatusDisplay = document.getElementById("file-status-display");
  const uploadResultBox = document.getElementById("upload-result-box");
  const uploadSummaryText = document.getElementById("upload-summary-text");
  
  const chatHistoryDiv = document.getElementById("chat-history");
  const chatErrorDiv = document.getElementById("chat-error");
  const queryInput = document.getElementById("query-input");
  const btnAskAI = document.getElementById("btn-ask-ai");
  const chatHeaderStatus = document.getElementById("chat-header-status");

  const modalOverlay = document.getElementById("modal-overlay");
  const modalClose = document.getElementById("modal-close");
  const modalTitle = document.getElementById("modal-title");
  const modalMetaSource = document.getElementById("modal-meta-source");
  const modalMetaDistance = document.getElementById("modal-meta-distance");
  const modalBodyContent = document.getElementById("modal-body-content");

  // 3. Event Listeners & Initialize
  document.addEventListener("DOMContentLoaded", () => {
    // Set initial input value
    if (apiInput) apiInput.value = apiBaseUrl;

    // Toggle settings panel
    btnSettings.addEventListener("click", () => {
      settingsPanel.classList.toggle("hidden");
    });

    // Save settings
    apiInput.addEventListener("change", (e) => {
      const val = e.target.value.trim().replace(/\/$/, "");
      apiBaseUrl = val;
      safeLocalStorage.setItem("rag_api_base_url", val);
      console.log("API URL saved:", val);
    });

    // Database Reset
    btnReset.addEventListener("click", resetDatabase);

    // File selection trigger
    btnFindFile.addEventListener("click", () => fileInput.click());
    dropzone.addEventListener("click", () => fileInput.click());

    // File input change
    fileInput.addEventListener("change", handleFileSelection);

    // Drag and drop event listeners
    dropzone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropzone.classList.add("drag-active");
    });

    dropzone.addEventListener("dragleave", () => {
      dropzone.classList.remove("drag-active");
    });

    dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropzone.classList.remove("drag-active");
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        handleFile(files[0]);
      }
    });

    // AI Query triggers
    btnAskAI.addEventListener("click", handleAskAI);
    queryInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        handleAskAI();
      }
    });

    // Modal Close
    modalClose.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e) => {
      if (e.target === modalOverlay) closeModal();
    });

    // Render Empty State Initial
    renderChat();
  });

  // 4. File Handlers
  function handleFileSelection(e) {
    const file = e.target.files[0];
    if (file) {
      handleFile(file);
    }
  }

  function handleFile(file) {
    if (file.type !== "application/pdf") {
      showUploadError("PDF 파일만 업로드할 수 있습니다.");
      clearFileInput();
      return;
    }
    
    // Set UI to uploading
    showUploadError("");
    setUploadingState(true);
    
    // File info box
    fileInfo.classList.remove("hidden");
    fileNameDisplay.textContent = file.name;
    fileNameDisplay.title = file.name;
    fileStatusDisplay.textContent = "업로드 중";
    fileStatusDisplay.className = "file-status uploading";

    uploadResultBox.classList.add("hidden");

    // Perform Upload
    uploadPDF(file);
  }

  function clearFileInput() {
    fileInput.value = "";
    fileInfo.classList.add("hidden");
  }

  function showUploadError(msg) {
    if (msg) {
      uploadError.textContent = msg;
      uploadError.classList.remove("hidden");
    } else {
      uploadError.textContent = "";
      uploadError.classList.add("hidden");
    }
  }

  function setUploadingState(isUploading) {
    uploading = isUploading;
    btnFindFile.disabled = isUploading;
    if (isUploading) {
      btnFindFile.innerHTML = '<div class="spinner"></div> 파싱 및 벡터 저장 중...';
    } else {
      btnFindFile.innerHTML = '<i class="fa-solid fa-folder-open"></i> 파일 찾기';
    }
  }

  async function uploadPDF(file) {
    const formData = new FormData();
    formData.append("file", file);

    try {
      const response = await fetch(`${apiBaseUrl}/api/documents/upload`, {
        method: "POST",
        body: formData,
      });

      if (!response.ok) {
        const errData = await response.json();
        throw new Error(errData.detail || "파일 파싱 및 벡터 DB 추가 실패");
      }

      const result = await response.json();
      
      // Update UI upload status
      fileStatusDisplay.textContent = "DB 등록됨";
      fileStatusDisplay.className = "file-status";
      
      // Render results counts
      uploadResultBox.classList.remove("hidden");
      uploadSummaryText.innerHTML = `
        <div>- 총 청크 수: ${result.summary.total_chunks}개</div>
        <div>- 텍스트 청크: ${result.summary.text_chunks}개</div>
        <div>- 추출된 표: ${result.summary.tables}개</div>
        <div>- 추출된 이미지: ${result.summary.images}개</div>
      `;

      // Append system message to chat history
      chatHistory.push({
        role: "system",
        content: `📄 문서 업로드 완료: ${file.name}\n(텍스트 청크: ${result.summary.text_chunks}개, 표: ${result.summary.tables}개, 이미지: ${result.summary.images}개 가 저장되었습니다.)`
      });
      renderChat();
    } catch (error) {
      console.error("Upload error:", error);
      showUploadError(error.message || "서버 통신 실패. API URL을 확인하세요.");
      fileStatusDisplay.textContent = "실패";
      fileStatusDisplay.className = "file-status error";
    } finally {
      setUploadingState(false);
    }
  }

  // 5. Database Operations
  async function resetDatabase() {
    if (!confirm("벡터 DB를 초기화하시겠습니까? 모든 인덱스 문서가 삭제됩니다.")) return;
    
    try {
      const response = await fetch(`${apiBaseUrl}/api/database/reset`, {
        method: "POST"
      });
      if (response.ok) {
        alert("벡터 데이터베이스가 성공적으로 초기화되었습니다.");
        clearFileInput();
        uploadResultBox.classList.add("hidden");
        chatHistory = [];
        renderChat();
      } else {
        throw new Error("초기화 실패");
      }
    } catch (error) {
      alert(`에러: ${error.message}`);
    }
  }

  // 6. AI Chat Operations
  function setLoadingState(isLoading) {
    loading = isLoading;
    btnAskAI.disabled = isLoading;
    queryInput.disabled = isLoading;

    if (isLoading) {
      chatHeaderStatus.classList.remove("hidden");
      btnAskAI.innerHTML = '<div class="spinner"></div> 생성 중...';
    } else {
      chatHeaderStatus.classList.add("hidden");
      btnAskAI.innerHTML = '<i class="fa-solid fa-paper-plane"></i> AI 질문하기';
    }
  }

  async function handleAskAI() {
    const currentQuestion = queryInput.value.trim();
    if (!currentQuestion || loading) return;

    // 3단계 요구사항: [나의 질문] 영역의 내용은 지우기
    queryInput.value = "";
    showChatError("");
    setLoadingState(true);

    // Add user query to conversation history
    chatHistory.push({ role: "user", content: currentQuestion });
    renderChat();

    // Prepare history payload for API call
    const cleanHistory = chatHistory
      .filter(msg => msg.role === "user" || msg.role === "assistant")
      .map(msg => ({ role: msg.role, content: msg.content }));

    try {
      const response = await fetch(`${apiBaseUrl}/api/chat/query`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          query: currentQuestion,
          history: cleanHistory,
          top_k: 5,
          use_multiquery: true
        }),
      });

      if (!response.ok) {
        const errData = await response.json();
        throw new Error(errData.detail || "답변 생성 실패");
      }

      const data = await response.json();
      
      // Add assistant response to history
      chatHistory.push({
        role: "assistant",
        content: data.answer,
        sources: data.sources
      });
      renderChat();
    } catch (error) {
      console.error("Query error:", error);
      showChatError(error.message || "서버 통신 오류가 발생했습니다.");
      chatHistory.push({
        role: "system",
        content: `⚠️ 에러 발생: ${error.message || "서버 응답 오류"}`
      });
      renderChat();
    } finally {
      setLoadingState(false);
    }
  }

  function showChatError(msg) {
    if (msg) {
      chatErrorDiv.textContent = msg;
      chatErrorDiv.classList.remove("hidden");
    } else {
      chatErrorDiv.textContent = "";
      chatErrorDiv.classList.add("hidden");
    }
  }

  // 7. Chat Rendering Logic
  function renderChat() {
    chatHistoryDiv.innerHTML = "";

    if (chatHistory.length === 0) {
      chatHistoryDiv.innerHTML = `
        <div class="empty-chat">
          <div class="empty-icon"><i className="fa-solid fa-message"><i class="fa-solid fa-comments"></i></i></div>
          <h3>RAG 대화 시작하기</h3>
          <p>PDF 문서를 왼쪽 영역에 업로드한 후,<br />질문을 입력하여 관련 텍스트, 표, 이미지 정보 검색 결과를 받아보세요.</p>
        </div>
      `;
      return;
    }

    chatHistory.forEach((msg, idx) => {
      const msgDiv = document.createElement("div");
      msgDiv.className = `message ${msg.role}`;
      
      // Sender Tag
      const senderDiv = document.createElement("div");
      senderDiv.className = "message-sender";
      senderDiv.textContent = msg.role === 'user' ? '나의 질문' : msg.role === 'assistant' ? 'AI 답변' : '시스템 알림';
      msgDiv.appendChild(senderDiv);

      // Bubble Content
      const bubbleDiv = document.createElement("div");
      bubbleDiv.className = "message-bubble";
      bubbleDiv.textContent = msg.content;
      msgDiv.appendChild(bubbleDiv);

      // Render Sources if present (RAW 데이터 확인 기능)
      if (msg.sources && msg.sources.length > 0) {
        const sourcesContainer = document.createElement("div");
        sourcesContainer.className = "sources-container";
        
        const sourcesTitle = document.createElement("div");
        sourcesTitle.className = "sources-title";
        sourcesTitle.textContent = "참조된 RAW 데이터 (클릭하여 전체 보기)";
        sourcesContainer.appendChild(sourcesTitle);

        const sourcesGrid = document.createElement("div");
        sourcesGrid.className = "sources-grid";

        msg.sources.forEach((src) => {
          const srcCard = document.createElement("div");
          srcCard.className = "source-card";
          
          // Badge color types
          const typeClass = src.metadata.type === 'text' ? 'text' : src.metadata.type === 'table' ? 'table' : 'image';
          const typeLabel = src.metadata.type === 'text' ? '텍스트' : src.metadata.type === 'table' ? '표 데이터' : '이미지';
          const snippet = src.metadata.type === 'image' ? src.metadata.caption : src.content;
          
          srcCard.innerHTML = `
            <div class="source-meta">
              <span class="source-type ${typeClass}">${typeLabel}</span>
              <span>P. ${src.metadata.page}</span>
            </div>
            <div class="source-snippet">${escapeHtml(snippet)}</div>
          `;

          // Trigger detail Modal on click
          srcCard.addEventListener("click", () => openSourceModal(src));
          sourcesGrid.appendChild(srcCard);
        });

        sourcesContainer.appendChild(sourcesGrid);
        msgDiv.appendChild(sourcesContainer);
      }

      chatHistoryDiv.appendChild(msgDiv);
    });

    // Auto scroll to bottom
    chatHistoryDiv.scrollTop = chatHistoryDiv.scrollHeight;
  }

  // Helper function to format image URL
  function formatImageUrl(originalPath) {
    if (!originalPath) return "";
    if (originalPath.startsWith("http://") || originalPath.startsWith("https://")) {
      return originalPath;
    }
    return `${apiBaseUrl}${originalPath}`;
  }

  // 8. Modal Management (Citations RAW 데이터 상세 확인)
  function openSourceModal(src) {
    modalTitle.textContent = `참조된 RAW 데이터 상세 보기 (${src.metadata.type.toUpperCase()})`;
    modalMetaSource.textContent = src.metadata.source;
    modalMetaSource.innerHTML = `<strong>출처 문서:</strong> ${src.metadata.source} (Page ${src.metadata.page})`;
    modalMetaDistance.innerHTML = `<strong>유사도 거리 (Distance):</strong> ${src.distance.toFixed(4)}`;

    modalBodyContent.innerHTML = "";

    if (src.metadata.type === "image") {
      const imgContainer = document.createElement("div");
      
      if (src.metadata.original_path) {
        const img = document.createElement("img");
        img.className = "source-image-preview";
        img.src = formatImageUrl(src.metadata.original_path);
        img.alt = "Raw Extracted Image";
        img.style.marginBottom = "12px";
        img.onerror = () => {
          img.style.display = "none";
        };
        imgContainer.appendChild(img);
      }

      const descBox = document.createElement("div");
      descBox.innerHTML = `
        <strong>이미지 요약 분석 텍스트:</strong>
        <div style="margin-top: 8px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px; white-space: pre-wrap;">${escapeHtml(src.content)}</div>
      `;
      imgContainer.appendChild(descBox);
      modalBodyContent.appendChild(imgContainer);

    } else if (src.metadata.type === "table") {
      const tableContainer = document.createElement("div");
      tableContainer.innerHTML = `
        <strong>마크다운 표 데이터:</strong>
        <div class="table-markdown-view">${escapeHtml(src.content)}</div>
      `;
      modalBodyContent.appendChild(tableContainer);

    } else {
      // type === "text"
      const textContainer = document.createElement("div");
      textContainer.innerHTML = `
        <strong>본문 텍스트 청크 내용:</strong>
        <div style="margin-top: 8px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px; white-space: pre-wrap; max-height: 300px; overflow-y: auto;">${escapeHtml(src.content)}</div>
      `;
      modalBodyContent.appendChild(textContainer);
    }

    modalOverlay.classList.remove("hidden");
  }

  function closeModal() {
    modalOverlay.classList.add("hidden");
  }

  // Helper to escape HTML characters
  function escapeHtml(text) {
    if (!text) return "";
    const map = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, function(m) { return map[m]; });
  }
</script>
