<style>
  /* Import Google Font */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  /* Global Reset & Base Variables */
  :root {
    --bg-main: #0b0f19;
    --bg-card: rgba(17, 24, 39, 0.8);
    --border-color: rgba(255, 255, 255, 0.08);
    --text-primary: #f3f4f6;
    --text-secondary: #9ca3af;
    
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --primary-glow: rgba(99, 102, 241, 0.35);
    
    --accent: #8b5cf6;
    --accent-glow: rgba(139, 92, 246, 0.35);
    
    --success: #10b981;
    --danger: #ef4444;
    --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background-color: var(--bg-main);
    color: var(--text-primary);
    font-family: var(--font-family);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    background-image: 
      radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.12) 0, transparent 50%),
      radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.12) 0, transparent 50%);
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Custom Scrollbar */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  ::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.02);
  }
  ::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.15);
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.3);
  }

  /* Layout Containers */
  .app-container {
    width: 100%;
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    flex-grow: 1;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border-color);
  }

  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.025em;
    background: linear-gradient(135deg, #a5b4fc, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 0.875rem;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  .main-grid {
    display: grid;
    grid-template-columns: 350px 1fr;
    gap: 24px;
    align-items: start;
    flex-grow: 1;
  }

  @media (max-width: 900px) {
    .main-grid {
      grid-template-columns: 1fr;
    }
  }

  /* Premium Card Design (Glassmorphism) */
  .card {
    background-color: var(--bg-card);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    padding-bottom: 12px;
  }

  /* Input fields & Dropzone styling */
  .dropzone {
    border: 2px dashed rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    background: rgba(255, 255, 255, 0.01);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .dropzone:hover {
    border-color: var(--primary);
    background: rgba(99, 102, 241, 0.03);
    box-shadow: 0 0 16px 0 rgba(99, 102, 241, 0.1);
  }

  .dropzone.drag-active {
    border-color: var(--accent);
    background: rgba(139, 92, 246, 0.05);
  }

  .dropzone-icon {
    font-size: 2rem;
    color: var(--text-secondary);
    transition: color 0.25s ease;
  }
  .dropzone:hover .dropzone-icon {
    color: var(--primary);
  }

  .dropzone p {
    font-size: 0.875rem;
    color: var(--text-secondary);
  }

  .dropzone span {
    font-size: 0.75rem;
    color: rgba(255, 255, 255, 0.3);
  }

  /* Hidden Input */
  .hidden-file-input {
    display: none;
  }

  /* Premium Buttons */
  .btn {
    font-family: var(--font-family);
    font-weight: 600;
    font-size: 0.9rem;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: #ffffff;
    box-shadow: 0 4px 14px 0 var(--primary-glow);
  }

  .btn-primary:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px 0 rgba(99, 102, 241, 0.45);
    background: linear-gradient(135deg, var(--primary-hover), #7c3aed);
  }

  .btn-primary:active:not(:disabled) {
    transform: translateY(0);
  }

  .btn-secondary {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-primary);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .btn-secondary:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.1);
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    box-shadow: none;
  }

  /* Textarea form inputs */
  .text-input-wrapper {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .text-input-wrapper label {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .textarea-field {
    width: 100%;
    min-height: 90px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text-primary);
    font-family: var(--font-family);
    font-size: 0.9rem;
    resize: vertical;
    transition: all 0.2s ease;
  }

  .textarea-field:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 2px var(--primary-glow);
    background: rgba(0, 0, 0, 0.3);
  }

  .input-field {
    width: 100%;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text-primary);
    font-family: var(--font-family);
    font-size: 0.85rem;
  }
  
  .input-field:focus {
    outline: none;
    border-color: var(--primary);
  }

  /* Chat Pane & Dialogues */
  .chat-panel {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 120px);
    min-height: 550px;
  }

  .chat-history {
    flex-grow: 1;
    overflow-y: auto;
    padding: 16px 4px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .message {
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeIn 0.3s ease-out forwards;
    max-width: 85%;
  }

  .message.user {
    align-self: flex-end;
    align-items: flex-end;
  }

  .message.assistant {
    align-self: flex-start;
    align-items: flex-start;
    max-width: 90%;
  }

  .message-bubble {
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 0.925rem;
    white-space: pre-wrap;
    word-break: break-word;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  .message.user .message-bubble {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: #ffffff;
    border-bottom-right-radius: 2px;
  }

  .message.assistant .message-bubble {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.05);
    color: var(--text-primary);
    border-top-left-radius: 2px;
  }

  .message-sender {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-secondary);
  }

  /* Citations and Sources */
  .sources-container {
    margin-top: 8px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .sources-title {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
  }

  .sources-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .source-card {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
    max-width: 260px;
  }

  .source-card:hover {
    background: rgba(255, 255, 255, 0.06);
    border-color: var(--primary);
  }

  .source-meta {
    display: flex;
    justify-content: space-between;
    font-weight: 600;
    color: var(--text-secondary);
  }

  .source-type {
    background: rgba(99, 102, 241, 0.15);
    color: #a5b4fc;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 0.65rem;
  }
  .source-type.table {
    background: rgba(16, 185, 129, 0.15);
    color: #a7f3d0;
  }
  .source-type.image {
    background: rgba(139, 92, 246, 0.15);
    color: #ddd6fe;
  }

  .source-snippet {
    color: rgba(255, 255, 255, 0.4);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* File items listed */
  .file-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255, 255, 255, 0.03);
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.05);
  }

  .file-name {
    font-size: 0.8rem;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 200px;
  }

  .file-status {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--success);
    background: rgba(16, 185, 129, 0.1);
    padding: 2px 6px;
    border-radius: 4px;
  }

  /* Loading indicator */
  .loading-container {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    color: var(--text-secondary);
    padding: 8px 12px;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-top: 2px solid var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* Dialog / Modal for raw details viewing */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.2s ease-out;
  }

  .modal {
    background: #111827;
    border: 1px solid var(--border-color);
    border-radius: 16px;
    width: 90%;
    max-width: 650px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    overflow: hidden;
  }

  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-title {
    font-weight: 600;
    font-size: 1rem;
  }

  .modal-close {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 1.25rem;
    cursor: pointer;
  }

  .modal-body {
    padding: 20px;
    overflow-y: auto;
    font-size: 0.9rem;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .source-image-preview {
    max-width: 100%;
    max-height: 300px;
    object-fit: contain;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: #000;
    margin: 0 auto;
    display: block;
  }

  .table-markdown-view {
    overflow-x: auto;
    background: rgba(0, 0, 0, 0.3);
    padding: 12px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 0.8rem;
    white-space: pre;
  }

  /* Empty state */
  .empty-chat {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-grow: 1;
    color: var(--text-secondary);
    gap: 12px;
    text-align: center;
    opacity: 0.6;
    padding: 40px;
  }

  .empty-icon {
    font-size: 3rem;
    margin-bottom: 8px;
  }

  /* Animations */
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
