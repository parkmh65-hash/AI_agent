<script>
  /**
   * Google Apps Script Frontend Javascript Logic (script.html)
   */

  document.addEventListener('DOMContentLoaded', () => {
    // UI elements
    const btnRequest = document.getElementById('btn-request');
    const txtQuestion = document.getElementById('ai-question');
    const boxOutput = document.getElementById('ai-output');

    // PDF Ingestion UI elements
    const pdfDropZone = document.getElementById('pdf-drop-zone');
    const pdfFileInput = document.getElementById('pdf-file-input');
    const btnBrowse = document.getElementById('btn-browse');
    const pdfStatus = document.getElementById('pdf-upload-status');

    // Setup AI Request Event Listener
    btnRequest.addEventListener('click', handleRequest);

    // Trigger file dialog
    btnBrowse.addEventListener('click', (e) => {
      e.stopPropagation(); // prevent drop zone click bubble
      pdfFileInput.click();
    });

    // Handle Drop Zone clicks (optionally trigger file browser too)
    pdfDropZone.addEventListener('click', () => {
      pdfFileInput.click();
    });

    pdfFileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        processFile(e.target.files[0]);
      }
    });

    // Drag and Drop handlers
    function handleDragOver(e) {
      e.preventDefault();
      pdfDropZone.classList.add('drag-over');
    }

    function handleDragLeave(e) {
      e.preventDefault();
      pdfDropZone.classList.remove('drag-over');
    }

    function handleDrop(e) {
      e.preventDefault();
      pdfDropZone.classList.remove('drag-over');
      
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        processFile(files[0]);
      }
    }

    pdfDropZone.addEventListener('dragover', handleDragOver);
    pdfDropZone.addEventListener('dragleave', handleDragLeave);
    pdfDropZone.addEventListener('drop', handleDrop);

    /**
     * Read file and encode to base64, then submit to GAS Backend.
     */
    function processFile(file) {
      if (!file.name.endsWith('.pdf')) {
        showStatus('error', '⚠️ PDF 파일만 업로드할 수 있습니다.');
        return;
      }

      showStatus('loading', `⏳ '${file.name}' 파일 분석 및 임베딩 생성 중입니다...`);

      // Read as DataURL (Base64)
      const reader = new FileReader();
      reader.onload = function(e) {
        const base64Data = e.target.result.split(',')[1]; // extract base64 part
        
        // Execute GAS upload function
        google.script.run
          .withSuccessHandler((res) => onUploadSuccess(res, file.name))
          .withFailureHandler((err) => onUploadFailure(err, file.name))
          .uploadPdfFile(base64Data, file.name);
      };
      reader.onerror = function() {
        showStatus('error', '❌ 파일을 읽는 중 오류가 발생했습니다.');
      };
      reader.readAsDataURL(file);
    }

    function onUploadSuccess(response, fileName) {
      if (response && response.error) {
        showStatus('error', `❌ 업로드 실패: ${response.message}`);
        return;
      }

      showStatus('success', `
        🎉 <strong>업로드 성공!</strong><br>
        • 파일명: ${fileName}<br>
        • 페이지 수: ${response.pages}p, 생성된 청크: ${response.chunks_added}개<br>
        • 현재 벡터 DB 총 데이터 행: <strong>${response.total_db_rows}</strong>개
      `);
    }

    function onUploadFailure(error, fileName) {
      showStatus('error', `❌ 서버 오류 발생 ('${fileName}'): ${error.message || error.toString()}`);
    }

    function showStatus(type, htmlContent) {
      pdfStatus.style.display = 'block';
      pdfStatus.className = `upload-status-box ${type}`;
      pdfStatus.innerHTML = htmlContent;
    }

    // Support submitting on Ctrl+Enter or Cmd+Enter
    txtQuestion.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        handleRequest();
      }
    });

    /**
     * Handles the AI request button trigger.
     */
    function handleRequest() {
      const query = txtQuestion.value.trim();

      if (!query) {
        alert("질문할 내용을 입력해 주세요.");
        txtQuestion.focus();
        return;
      }

      // Display loading state (as requested: "AI 질문중입니다" in the output box)
      boxOutput.className = "ai-answer-box"; // remove empty-state class
      boxOutput.innerHTML = `
        <div class="loading-container">
          <div class="spinner"></div>
          <span>AI 질문중입니다...</span>
        </div>
      `;

      // Disable inputs during network request
      btnRequest.disabled = true;
      txtQuestion.disabled = true;

      // Execute Google Apps Script backend function
      google.script.run
        .withSuccessHandler(onSuccess)
        .withFailureHandler(onFailure)
        .askAI(query);
    }

    /**
     * Success handler for Code.gs askAI call.
     */
    function onSuccess(response) {
      // Re-enable input components
      btnRequest.disabled = false;
      txtQuestion.disabled = false;

      if (response && response.error) {
        boxOutput.innerHTML = `
          <div style="color: var(--error-color); font-weight: 600;">질문 요청 실패</div>
          <div class="chat-response-content">${formatContent(response.reply)}</div>
        `;
        return;
      }

      // Clear the user input text box upon successful response
      txtQuestion.value = "";

      const reply = response.reply || (typeof response === 'string' ? response : JSON.stringify(response));
      const rowCount = response.db_row_count !== undefined ? response.db_row_count : 0;
      const executionTime = response.execution_time_sec !== undefined ? response.execution_time_sec : 0.0;
      const responseTimeStr = response.response_time || "방금 전";
      const routeMode = response.route || "rag"; // default to rag if missing

      // Map routeMode to Korean readable label and style
      let routeBadgeHtml = "";
      if (routeMode === "rag") {
        routeBadgeHtml = `<span class="route-tag rag-mode">RAG 문서 검색</span>`;
      } else {
        routeBadgeHtml = `<span class="route-tag general-mode">일반 대화</span>`;
      }

      // Render the response with metadata
      boxOutput.innerHTML = `
        <div class="chat-response-content">${formatContent(reply)}</div>
        <div class="ai-meta-block">
          <div class="meta-item">
            <span class="material-symbols-outlined meta-sub-icon">route</span>
            <span>분석 모드: ${routeBadgeHtml}</span>
          </div>
          <div class="meta-item">
            <span class="material-symbols-outlined meta-sub-icon">database</span>
            <span>RAG 벡터 DB 행: <strong>${rowCount}</strong>개</span>
          </div>
          <div class="meta-item">
            <span class="material-symbols-outlined meta-sub-icon">timer</span>
            <span>수행 속도: <strong>${executionTime.toFixed(2)}</strong>초</span>
          </div>
          <div class="meta-item">
            <span class="material-symbols-outlined meta-sub-icon">schedule</span>
            <span>응답 시각: <strong>${responseTimeStr}</strong></span>
          </div>
        </div>
      `;
    }

    /**
     * Failure handler for Code.gs askAI call.
     */
    function onFailure(error) {
      btnRequest.disabled = false;
      txtQuestion.disabled = false;

      boxOutput.innerHTML = `
        <div style="color: var(--error-color); font-weight: 600;">통신 실패</div>
        <div class="chat-response-content">Google Apps Script와의 통신 중 오류가 발생했습니다.<br>${error.message || error.toString()}</div>
      `;
    }

    /**
     * Helper to parse markdown elements like **bold** and `code` into HTML.
     */
    function formatContent(text) {
      if (!text) return "";
      
      // Escape HTML entities to prevent XSS
      let escaped = text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

      // Format markdown bold (**text**) to HTML strong
      escaped = escaped.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

      // Format markdown backticks (`code`) to HTML code
      escaped = escaped.replace(/`(.*?)`/g, '<code>$1</code>');

      // Format bullet points (- item or * item)
      escaped = escaped.replace(/^\s*[-*]\s+(.*?)$/gm, '• $1');

      // Handle newlines
      escaped = escaped.replace(/\n/g, '<br>');

      return escaped;
    }
  });
</script>
