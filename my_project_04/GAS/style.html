<style>
  /* -------------------------------------------------------------
     Premium Glassmorphism & Cyberpunk Neon Design System (Project 04)
  ------------------------------------------------------------- */
  
  :root {
    --bg-gradient-start: #060814;
    --bg-gradient-end: #0f1123;
    --card-bg: rgba(20, 24, 46, 0.6);
    --card-border: rgba(99, 102, 241, 0.12);
    --text-primary: #F1F5F9;
    --text-secondary: #94A3B8;
    --text-muted: #475569;
    --primary-gradient: linear-gradient(135deg, #06B6D4 0%, #3B82F6 50%, #8B5CF6 100%);
    --primary-glow: rgba(59, 130, 246, 0.35);
    --success-color: #10B981;
    --error-color: #EF4444;
    --accent-color: #06B6D4;
    --accent-glow: rgba(6, 182, 212, 0.4);
    --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  /* Reset & Base Styles */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: var(--font-sans);
    background: linear-gradient(180deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px;
    overflow-y: auto;
  }

  /* Custom Scrollbar */
  ::-webkit-scrollbar {
    width: 8px;
  }
  ::-webkit-scrollbar-track {
    background: rgba(6, 8, 20, 0.6);
  }
  ::-webkit-scrollbar-thumb {
    background: rgba(99, 102, 241, 0.25);
    border-radius: 10px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(6, 182, 212, 0.5);
    box-shadow: 0 0 10px var(--accent-glow);
  }

  /* Layout Container */
  .app-container {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* Navigation Bar */
  .app-navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(15, 23, 42, 0.7);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 16px 28px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    font-size: 2.2rem;
    background: var(--primary-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 8px var(--primary-glow));
    animation: pulseGlow 4s infinite ease-in-out;
  }

  .logo-text {
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: var(--primary-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .nav-menu {
    display: flex;
    gap: 12px;
  }

  .nav-item {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: 1px solid transparent;
    outline: none;
    color: var(--text-secondary);
    font-family: var(--font-sans);
    font-size: 0.95rem;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .nav-item:hover {
    color: var(--text-primary);
    background: rgba(255, 255, 255, 0.04);
    border-color: rgba(255, 255, 255, 0.05);
  }

  .nav-item.active {
    color: white;
    background: linear-gradient(135deg, rgba(6, 182, 212, 0.2) 0%, rgba(59, 130, 246, 0.2) 100%);
    border: 1px solid rgba(6, 182, 212, 0.4);
    box-shadow: 0 4px 15px rgba(6, 182, 212, 0.15);
  }

  .nav-icon {
    font-size: 1.2rem;
  }

  /* Main Views */
  .app-main {
    position: relative;
    width: 100%;
  }

  .app-view {
    display: none;
    flex-direction: column;
    gap: 24px;
    animation: fadeIn 0.4s ease;
  }

  .app-view.active {
    display: flex;
  }

  /* Header inside View */
  .view-header {
    text-align: center;
    padding: 10px 0;
  }

  .view-title {
    font-size: 2.2rem;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #FFF 40%, #A5B4FC 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.5));
  }

  .view-subtitle {
    font-size: 0.95rem;
    color: var(--text-secondary);
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  /* Card Component */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 28px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0px rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease, border-color 0.3s ease;
  }

  .card:hover {
    border-color: rgba(6, 182, 212, 0.3);
    box-shadow: 0 25px 50px rgba(6, 182, 212, 0.1), 0 20px 40px rgba(0, 0, 0, 0.6);
  }

  /* Input Section */
  .input-section {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .input-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--text-primary);
  }

  .label-icon, .title-icon {
    color: var(--accent-color);
    filter: drop-shadow(0 0 5px var(--accent-glow));
  }

  .input-wrapper {
    position: relative;
    border-radius: 16px;
    background: rgba(6, 8, 20, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.05);
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent-color);
    box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-primary);
    padding: 18px;
    font-family: var(--font-sans);
    font-size: 1rem;
    line-height: 1.6;
    resize: none;
  }

  textarea::placeholder {
    color: var(--text-muted);
  }

  /* Button Premium */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--primary-gradient);
    border: none;
    outline: none;
    border-radius: 16px;
    color: white;
    font-family: var(--font-sans);
    font-size: 1rem;
    font-weight: 600;
    padding: 14px 32px;
    cursor: pointer;
    align-self: flex-end;
    box-shadow: 0 4px 20px var(--primary-glow);
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s ease, opacity 0.2s ease;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(59, 130, 246, 0.6);
  }

  .btn-primary:active {
    transform: translateY(1px);
  }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-icon {
    font-size: 1.2rem;
  }

  /* Output Answer Display */
  .output-section {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .output-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.25rem;
    font-weight: 600;
  }

  .ai-answer-box {
    min-height: 180px;
    max-height: 480px;
    overflow-y: auto;
    background: rgba(6, 8, 20, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 16px;
    padding: 24px;
    line-height: 1.7;
    font-size: 1rem;
    display: flex;
    flex-direction: column;
    gap: 20px;
    transition: all 0.3s ease;
  }

  /* Empty/Initial State */
  .ai-answer-box.empty-state {
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    text-align: center;
    gap: 12px;
  }

  .default-state-icon {
    font-size: 2.5rem;
    color: rgba(255, 255, 255, 0.08);
  }

  .placeholder-text {
    font-size: 0.95rem;
    font-weight: 300;
  }

  /* Message Formatting */
  .chat-response-content {
    white-space: pre-wrap;
    color: var(--text-primary);
  }

  .chat-response-content strong {
    color: #FFF;
    background: linear-gradient(120deg, rgba(6, 182, 212, 0.15) 0%, rgba(6, 182, 212, 0.0) 100%);
    padding: 2px 6px;
    border-radius: 4px;
  }

  .chat-response-content code {
    background: rgba(255, 255, 255, 0.06);
    color: #E2E8F0;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 0.9rem;
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  /* Meta & Diagnostic info block */
  .ai-meta-block {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    padding-top: 12px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    font-size: 0.8rem;
    color: var(--text-secondary);
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .meta-sub-icon {
    font-size: 1rem;
    color: var(--accent-color);
  }

  /* Secondary views styling (greeting card) */
  .greeting-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 40px;
    gap: 16px;
  }

  .greeting-icon {
    font-size: 3.5rem;
    background: var(--primary-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 10px var(--primary-glow));
    margin-bottom: 8px;
  }

  .greeting-card h2 {
    font-size: 1.8rem;
    font-weight: 800;
  }

  .greeting-desc {
    font-size: 1rem;
    color: var(--text-secondary);
    max-width: 450px;
    line-height: 1.6;
  }

  /* Footer */
  .app-footer {
    text-align: center;
    padding: 10px 0;
    color: var(--text-muted);
    font-size: 0.85rem;
    font-weight: 300;
  }

  /* Loading Spinner Custom */
  .loading-container {
    display: flex;
    align-items: center;
    gap: 14px;
    color: var(--accent-color);
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid rgba(6, 182, 212, 0.15);
    border-top-color: var(--accent-color);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes pulseGlow {
    0%, 100% { filter: drop-shadow(0 0 6px var(--primary-glow)); }
    50% { filter: drop-shadow(0 0 14px rgba(6, 182, 212, 0.65)); }
  }

  /* Responsive Design */
  @media(max-width: 680px) {
    body {
      padding: 12px;
    }
    .app-navbar {
      flex-direction: column;
      gap: 16px;
      padding: 18px;
    }
    .nav-menu {
      width: 100%;
      justify-content: space-around;
    }
    .nav-item {
      padding: 8px 12px;
      font-size: 0.85rem;
    }
    .card {
      padding: 20px;
    }
    .view-title {
      font-size: 1.7rem;
    }
    .btn-primary {
      width: 100%;
      align-self: center;
    }
  }
</style>
