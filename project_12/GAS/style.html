<style>
:root {
  --bg-main: #0b0f19;
  --bg-card: rgba(22, 28, 45, 0.6);
  --border-color: rgba(255, 255, 255, 0.08);
  --border-focus: #6366f1;
  --text-main: #f3f4f6;
  --text-muted: #9ca3af;
  --accent-color: #818cf8;
  --accent-success: #34d399;
  --accent-warning: #fbbf24;
  --accent-danger: #f87171;
  --shadow-main: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
  --font-family: 'Plus Jakarta Sans', 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background-color: var(--bg-main);
  color: var(--text-main);
  font-family: var(--font-family);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background-image: 
    radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
    radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.1) 0px, transparent 50%),
    radial-gradient(at 50% 100%, rgba(17, 24, 39, 0.9) 0px, transparent 50%);
  background-attachment: fixed;
  overflow-x: hidden;
}

.app-container {
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  flex: 1;
}

/* Header */
.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px;
  background: var(--bg-card);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  box-shadow: var(--shadow-main);
  flex-wrap: wrap;
  gap: 15px;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 32px;
  height: 32px;
  color: var(--accent-color);
}

.logo-area h1 {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.logo-area h1 span {
  font-size: 0.9rem;
  font-weight: 400;
  color: var(--text-muted);
  background: rgba(255, 255, 255, 0.08);
  padding: 2px 8px;
  border-radius: 6px;
  margin-left: 6px;
  vertical-align: middle;
}

.server-config {
  display: flex;
  align-items: center;
  gap: 10px;
}

.server-config label {
  font-size: 0.85rem;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 5px;
}

.server-config input {
  background: rgba(0, 0, 0, 0.25);
  border: 1px solid var(--border-color);
  color: var(--text-main);
  padding: 8px 12px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.9rem;
  width: 250px;
  transition: var(--transition-fast);
}

.server-config input:focus {
  outline: none;
  border-color: var(--border-focus);
  box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
}

/* Layout */
.app-content {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 20px;
  flex: 1;
}

@media (max-width: 1024px) {
  .app-content {
    grid-template-columns: 1fr;
  }
}

/* Cards */
.card {
  background: var(--bg-card);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 24px;
  box-shadow: var(--shadow-main);
  display: flex;
  flex-direction: column;
  gap: 16px;
  transition: transform var(--transition-normal), box-shadow var(--transition-normal);
}

.card:hover {
  box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
}

.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border-color);
  padding-bottom: 12px;
}

.card-header i {
  color: var(--accent-color);
  width: 24px;
  height: 24px;
}

.card-header h2 {
  font-size: 1.2rem;
  font-weight: 600;
}

.card-description {
  font-size: 0.88rem;
  color: var(--text-muted);
  line-height: 1.5;
}

/* Left panel upload dropzone */
.left-panel {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.upload-dropzone {
  border: 2px dashed rgba(255, 255, 255, 0.15);
  border-radius: 12px;
  padding: 40px 20px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  background: rgba(255, 255, 255, 0.02);
  transition: var(--transition-normal);
}

.upload-dropzone:hover, .upload-dropzone.dragover {
  border-color: var(--accent-color);
  background: rgba(99, 102, 241, 0.05);
}

.dropzone-icon {
  width: 48px;
  height: 48px;
  color: var(--text-muted);
  transition: var(--transition-fast);
}

.upload-dropzone:hover .dropzone-icon {
  color: var(--accent-color);
  transform: translateY(-4px);
}

.upload-dropzone p {
  font-size: 0.9rem;
  color: var(--text-muted);
}

/* File Info Box */
.file-info-container {
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: rgba(255, 255, 255, 0.03);
  padding: 16px;
  border-radius: 10px;
  border: 1px solid var(--border-color);
}

.file-details {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.9rem;
}

.file-icon {
  color: var(--accent-color);
}

/* Buttons */
button {
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 500;
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: var(--transition-fast);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-primary {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
}

.btn-primary:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(99, 102, 241, 0.5);
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-secondary {
  background: rgba(255, 255, 255, 0.08);
  color: var(--text-main);
  border: 1px solid var(--border-color);
}

.btn-secondary:hover {
  background: rgba(255, 255, 255, 0.15);
}

.btn-accent {
  background: linear-gradient(135deg, #10b981, #059669);
  color: white;
  box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
}

.btn-accent:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(16, 185, 129, 0.5);
}

/* Status Panel */
.status-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.status-item {
  background: rgba(0, 0, 0, 0.2);
  border: 1px solid var(--border-color);
  padding: 16px;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.status-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.status-value {
  font-size: 1.3rem;
  font-weight: 700;
}

.status-online {
  color: var(--accent-success);
}

.status-offline {
  color: var(--accent-danger);
}

/* Right Panel: Chat Card */
.right-panel {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.chat-input-area {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.chat-input-area label {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-main);
}

.chat-input-area textarea {
  background: rgba(0, 0, 0, 0.25);
  border: 1px solid var(--border-color);
  color: var(--text-main);
  border-radius: 10px;
  padding: 14px;
  font-family: inherit;
  font-size: 0.95rem;
  resize: vertical;
  line-height: 1.5;
  transition: var(--transition-fast);
}

.chat-input-area textarea:focus {
  outline: none;
  border-color: var(--border-focus);
  box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
}

.chat-actions {
  display: flex;
  justify-content: flex-end;
}

.chat-output-area {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
}

.output-header {
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border-color);
  padding-bottom: 6px;
}

.answer-box {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 20px;
  line-height: 1.7;
  font-size: 0.98rem;
  min-height: 150px;
  white-space: pre-wrap;
}

.answer-box.placeholder {
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-style: italic;
}

.answer-box.loading {
  position: relative;
  overflow: hidden;
  color: var(--accent-color);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 15px;
  font-weight: 500;
}

.answer-box.loading::after {
  content: "";
  display: block;
  width: 32px;
  height: 32px;
  border: 3px solid rgba(129, 140, 248, 0.2);
  border-radius: 50%;
  border-top-color: var(--accent-color);
  animation: spin 1s ease-in-out infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Diagnostics Panel */
.diagnostics-summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
}

.metric-box {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border-color);
  padding: 16px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.metric-icon {
  width: 28px;
  height: 28px;
  color: var(--accent-color);
}

.metric-data {
  display: flex;
  flex-direction: column;
}

.metric-value {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--text-main);
}

.metric-label {
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* Pipeline Flow Visualizer */
.pipeline-flow {
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: rgba(0, 0, 0, 0.2);
  padding: 20px;
  border-radius: 12px;
  border: 1px solid var(--border-color);
}

.pipeline-flow h3 {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-main);
}

.flow-steps {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 5px;
  flex-wrap: wrap;
}

.flow-step {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 0.8rem;
  color: var(--text-muted);
  font-weight: 500;
  transition: var(--transition-normal);
  text-align: center;
  flex: 1;
  min-width: 100px;
}

.flow-step.active {
  background: rgba(99, 102, 241, 0.15);
  border-color: var(--border-focus);
  color: var(--text-main);
  box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
}

.flow-arrow {
  display: flex;
  align-items: center;
  color: rgba(255, 255, 255, 0.15);
}

.flow-arrow i {
  width: 16px;
  height: 16px;
}

/* Detail sub-cards */
.queries-detail, .hyde-detail {
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid var(--border-color);
  padding: 16px;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.queries-detail h4, .hyde-detail h4 {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text-main);
  display: flex;
  align-items: center;
  gap: 6px;
}

.queries-detail h4 i, .hyde-detail h4 i {
  width: 16px;
  height: 16px;
  color: var(--accent-color);
}

.queries-detail ul {
  list-style: none;
  padding-left: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.queries-detail li {
  font-size: 0.85rem;
  color: var(--text-muted);
  background: rgba(0, 0, 0, 0.15);
  padding: 8px 12px;
  border-radius: 6px;
  border-left: 3px solid var(--accent-color);
}

.hyde-doc-box {
  font-size: 0.85rem;
  color: var(--text-muted);
  background: rgba(0, 0, 0, 0.15);
  padding: 12px;
  border-radius: 6px;
  line-height: 1.5;
  max-height: 150px;
  overflow-y: auto;
}

.status-msg {
  font-size: 0.85rem;
  margin-top: 5px;
}

.status-msg.success {
  color: var(--accent-success);
}

.status-msg.error {
  color: var(--accent-danger);
}
</style>
